<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Password Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap');

  :root {
    --black:    #0d0d0d;
    --charcoal: #1f1f1f;
    --dark:     #2e2e2e;
    --mid:      #6b6b6b;
    --light:    #b0b0b0;
    --hairline: #e0e0e0;
    --off:      #f4f4f4;
    --white:    #ffffff;
    --navy:     #1b3a5c;   /* trust */
    --teal:     #2a7c6f;   /* trust / security */
    --red:      #b53a3a;   /* danger only */
    --font: Calibri, 'Nunito', 'Gill Sans', 'Trebuchet MS', sans-serif;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 400;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* thin top accent bar */
  body::before {
    content:'';
    display:block;
    height: 3px;
    background: linear-gradient(90deg, var(--navy) 0%, var(--teal) 100%);
    position: fixed; top:0; left:0; right:0; z-index:999;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 3.5rem 2rem 6rem;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 1.25rem;
    border-bottom: 1.5px solid var(--black);
    margin-bottom: 3.5rem;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-icon {
    width: 32px; height: 32px;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    color: var(--white);
    font-size: 15px;
  }

  .brand-name {
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--black);
  }

  .brand-name span {
    color: var(--teal);
  }

  .hdr-status {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--light);
  }

  .hdr-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--hairline);
    border: 1px solid var(--light);
  }
  .hdr-dot.on {
    background: var(--teal);
    border-color: var(--teal);
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Animations ── */
  @keyframes rise {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── Lock Screen ── */
  #lock-screen {
    display:flex; flex-direction:column; align-items:center;
    padding-top: 3rem;
    animation: rise .5s ease both;
  }

  .lock-icon-wrap {
    width: 64px; height: 64px;
    border: 1.5px solid var(--hairline);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    color: var(--navy);
    margin-bottom: 1.75rem;
    background: var(--off);
  }

  .lock-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 0.35rem;
    letter-spacing: 0.01em;
  }

  .lock-sub {
    font-size: 0.78rem;
    color: var(--mid);
    margin-bottom: 2rem;
  }

  .lock-form { width: 100%; max-width: 320px; }

  /* ── Inputs ── */
  .field { margin-bottom: 1rem; }

  .field-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--dark);
    margin-bottom: 0.4rem;
  }

  .inp-row { position:relative; }
  .inp-row input { padding-right: 3.2rem; }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: var(--white);
    border: 1.5px solid var(--hairline);
    border-radius: 0;
    padding: 0.62rem 0.85rem;
    color: var(--black);
    font-family: var(--font);
    font-size: 0.85rem;
    outline: none;
    transition: border-color .18s, box-shadow .18s;
    -webkit-appearance: none;
  }
  input::placeholder { color: var(--light); }
  input:focus {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(27,58,92,.08);
  }

  .vis-btn {
    position:absolute; right:.75rem; top:50%;
    transform:translateY(-50%);
    background:none; border:none; cursor:pointer;
    font-family: var(--font);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--light);
    transition: color .18s; padding:0;
  }
  .vis-btn:hover { color: var(--navy); }

  .bar-track { height: 2px; background: var(--hairline); margin-top: 5px; }
  .bar-fill  { height:100%; width:0%; transition: width .3s, background .3s; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
    font-family: var(--font);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: .04em;
    cursor: pointer; transition: all .18s; border: none;
    padding: .65rem 1.25rem;
  }

  .btn-solid {
    background: var(--navy);
    color: var(--white); width: 100%;
  }
  .btn-solid:hover { background: var(--charcoal); }

  .btn-ghost {
    background: transparent;
    color: var(--dark);
    border: 1.5px solid var(--hairline);
  }
  .btn-ghost:hover { border-color: var(--navy); color: var(--navy); }

  .btn-inline {
    background: none; border: none; cursor: pointer;
    font-family: var(--font);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--light);
    padding: .28rem .45rem;
    transition: color .18s;
  }
  .btn-inline:hover { color: var(--navy); }
  .btn-inline.danger:hover { color: var(--red); }

  .hint {
    font-size: 0.68rem; color: var(--light);
    text-align: center; margin-top: .85rem;
  }

  /* ── Vault ── */
  #vault-screen { display:none; animation: rise .4s ease both; }

  /* Stats */
  .stats {
    display: flex;
    border: 1.5px solid var(--black);
    margin-bottom: 2.5rem;
  }

  .stat {
    flex:1; text-align:center;
    padding: 1.1rem .75rem;
    border-right: 1px solid var(--hairline);
  }
  .stat:last-child { border-right:none; }

  .stat-n {
    font-size: 2rem; font-weight: 300;
    line-height: 1; color: var(--black);
    letter-spacing: -0.02em;
  }
  .stat-n.alert { color: var(--red); }

  .stat-l {
    font-size: 0.62rem; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--light); margin-top: .3rem;
  }

  /* Toolbar */
  .toolbar { display:flex; gap:.5rem; margin-bottom:1.75rem; }
  .search-box { flex:1; }

  /* Section divider */
  .sec-rule {
    display:flex; align-items:center; gap:.85rem;
    margin-bottom: .85rem;
  }
  .sec-rule-label {
    font-size: 0.62rem; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--light); white-space:nowrap;
  }
  .sec-rule-line { flex:1; height:1px; background: var(--hairline); }

  /* Entries */
  #entries-list { display:flex; flex-direction:column; }

  .entry {
    display:flex; align-items:center; gap: 1rem;
    padding: .85rem 0;
    border-bottom: 1px solid var(--hairline);
    animation: rise .25s ease both;
  }
  .entry:first-child { border-top: 1px solid var(--hairline); }

  .entry-avatar {
    width: 34px; height: 34px;
    background: var(--off);
    border: 1px solid var(--hairline);
    display:flex; align-items:center; justify-content:center;
    font-size: 0.85rem; font-weight: 600;
    color: var(--navy);
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .entry-body { flex:1; min-width:0; }

  .entry-site {
    font-size: 0.9rem; font-weight: 600;
    color: var(--black);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .entry-sub {
    display:flex; align-items:center; gap:.5rem;
    margin-top: .15rem;
  }

  .entry-user {
    font-size: 0.7rem; color: var(--mid);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width: 180px;
  }

  .pip { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .pip.strong { background: var(--teal); }
  .pip.medium { background: #b8963a; }
  .pip.weak   { background: var(--red); }

  .entry-right {
    display:flex; align-items:center;
    flex-shrink:0;
  }

  .pw-val {
    font-size: 0.7rem; color: var(--light);
    min-width: 90px; text-align:right;
    padding-right: .5rem; letter-spacing:.04em;
    font-family: 'Courier New', monospace;
  }
  .pw-val.shown { color: var(--dark); }

  /* ── Modal ── */
  .overlay {
    display:none; position:fixed; inset:0;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(4px);
    z-index:100; align-items:center; justify-content:center; padding:1rem;
  }
  .overlay.open { display:flex; }

  .modal {
    background: var(--white);
    border: 1.5px solid var(--black);
    width:100%; max-width: 380px;
    padding: 1.75rem;
    animation: rise .22s cubic-bezier(.34,1.56,.64,1) both;
    box-shadow: 6px 6px 0 var(--off);
  }

  .modal-head {
    display:flex; justify-content:space-between; align-items:center;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--hairline);
    margin-bottom: 1.5rem;
  }

  .modal-title {
    font-size: 1rem; font-weight: 600;
    color: var(--black); letter-spacing:.01em;
  }

  .modal-close {
    background:none; border:none; cursor:pointer;
    font-family: var(--font);
    font-size: 0.68rem; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--light); transition:color .18s;
  }
  .modal-close:hover { color: var(--red); }

  .modal-foot { display:flex; gap:.5rem; margin-top:1.4rem; }
  .modal-foot .btn { flex:1; }

  /* Trust badge in lock screen */
  .trust-badges {
    display: flex; gap: .75rem;
    margin-top: 1.5rem; justify-content: center;
  }
  .badge {
    display: flex; align-items: center; gap: .35rem;
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: .04em; text-transform: uppercase;
    color: var(--mid);
    padding: .3rem .6rem;
    border: 1px solid var(--hairline);
    background: var(--off);
  }
  .badge span { color: var(--teal); }

  /* Generator */
  .gen-out {
    background: var(--off);
    border: 1.5px solid var(--hairline);
    padding: .85rem 1rem;
    font-family: 'Courier New', monospace;
    font-size: .8rem; color: var(--dark);
    word-break: break-all; line-height: 1.65;
    margin-bottom: 1.4rem; min-height: 52px;
    letter-spacing: .04em;
  }

  .gen-opts { display:flex; flex-direction:column; gap:.85rem; margin-bottom:1.4rem; }

  .tog-row {
    display:flex; align-items:center; justify-content:space-between;
    font-size: .75rem; color: var(--dark);
  }

  .pill {
    width:34px; height:17px; background:var(--hairline);
    border-radius:9px; position:relative;
    cursor:pointer; border:none; transition:background .18s; flex-shrink:0;
  }
  .pill.on { background: var(--navy); }
  .pill::after {
    content:''; position:absolute;
    width:11px; height:11px; background:var(--white);
    border-radius:50%; top:3px; left:3px; transition:transform .18s;
  }
  .pill.on::after { transform:translateX(17px); }

  .range-wrap { display:flex; align-items:center; gap:.6rem; }
  input[type="range"] { flex:1; accent-color: var(--navy); cursor:pointer; }
  .range-n { font-size:.72rem; font-weight:600; color:var(--dark); min-width:18px; text-align:right; }

  /* Empty */
  .empty { text-align:center; padding:5rem 2rem; }
  .empty-icon { font-size:2.5rem; opacity:.12; margin-bottom:.75rem; line-height:1; }
  .empty-msg {
    font-size:.72rem; color:var(--light);
    letter-spacing:.1em; text-transform:uppercase; font-weight:600;
  }

  /* Toast */
  .toast {
    position:fixed; bottom:2rem; left:50%;
    transform:translateX(-50%) translateY(8px);
    background:var(--navy); color:var(--white);
    font-family: var(--font);
    font-size:.7rem; font-weight:600;
    letter-spacing:.08em; text-transform:uppercase;
    padding:.45rem 1.2rem; opacity:0;
    transition:all .22s; pointer-events:none;
    white-space:nowrap; z-index:999;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-icon">🔒</div>
      <div class="brand-name">Pass<span>Vault</span></div>
    </div>
    <div class="hdr-status">
      <div class="hdr-dot" id="hdr-dot"></div>
      <span id="hdr-txt">Locked</span>
    </div>
  </header>

  <!-- Lock Screen -->
  <div id="lock-screen">
    <div class="lock-icon-wrap">🔐</div>
    <div class="lock-title">Your vault is locked</div>
    <div class="lock-sub">Enter your master password to continue</div>
    <div class="lock-form">
      <div class="field">
        <label class="field-label">Master Password</label>
        <div class="inp-row">
          <input type="password" id="master-inp" placeholder="Enter password..." autocomplete="off">
          <button class="vis-btn" onclick="toggleVis('master-inp')">Show</button>
        </div>
        <div class="bar-track"><div class="bar-fill" id="master-bar"></div></div>
      </div>
      <button class="btn btn-solid" onclick="unlock()">Unlock Vault</button>
      <div class="trust-badges">
        <div class="badge"><span>✓</span> Encrypted</div>
        <div class="badge"><span>✓</span> Local only</div>
        <div class="badge"><span>✓</span> Zero tracking</div>
      </div>
      <p class="hint">Demo mode — any password works</p>
    </div>
  </div>

  <!-- Vault Screen -->
  <div id="vault-screen">

    <div class="stats">
      <div class="stat">
        <div class="stat-n" id="s-total">0</div>
        <div class="stat-l">Stored</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="s-strong">0</div>
        <div class="stat-l">Strong</div>
      </div>
      <div class="stat">
        <div class="stat-n alert" id="s-weak">0</div>
        <div class="stat-l">Weak</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="search" placeholder="Search credentials..." oninput="render()">
      </div>
      <button class="btn btn-ghost" style="width:auto" onclick="openGen()">Generate</button>
      <button class="btn btn-solid" style="width:auto" onclick="openAdd()">+ Add</button>
    </div>

    <div class="sec-rule">
      <span class="sec-rule-label">Saved Credentials</span>
      <div class="sec-rule-line"></div>
    </div>

    <div id="entries-list"></div>
  </div>

</div>

<!-- Add / Edit Modal -->
<div class="overlay" id="modal-add">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-title">Add Password</span>
      <button class="modal-close" onclick="closeModal('modal-add')">Close</button>
    </div>
    <div class="field">
      <label class="field-label">Website</label>
      <input type="text" id="f-site" placeholder="github.com">
    </div>
    <div class="field">
      <label class="field-label">Username or Email</label>
      <input type="text" id="f-user" placeholder="you@email.com">
    </div>
    <div class="field">
      <label class="field-label">Password</label>
      <div class="inp-row">
        <input type="password" id="f-pass" placeholder="Enter password..." oninput="checkStr()">
        <button class="vis-btn" onclick="toggleVis('f-pass')">Show</button>
      </div>
      <div class="bar-track"><div class="bar-fill" id="field-bar"></div></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-add')">Cancel</button>
      <button class="btn btn-solid" onclick="save()">Save</button>
    </div>
  </div>
</div>

<!-- Generator Modal -->
<div class="overlay" id="modal-gen">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Generate Password</span>
      <button class="modal-close" onclick="closeModal('modal-gen')">Close</button>
    </div>
    <div class="gen-out" id="gen-out">—</div>
    <div class="gen-opts">
      <div class="tog-row">
        <span>Length</span>
        <div class="range-wrap">
          <input type="range" id="g-len" min="8" max="32" value="16" oninput="syncLen();gen()">
          <span class="range-n" id="g-len-n">16</span>
        </div>
      </div>
      <div class="tog-row">
        <span>Uppercase A – Z</span>
        <button class="pill on" id="g-upper" onclick="togglePill(this);gen()"></button>
      </div>
      <div class="tog-row">
        <span>Numbers 0 – 9</span>
        <button class="pill on" id="g-nums" onclick="togglePill(this);gen()"></button>
      </div>
      <div class="tog-row">
        <span>Symbols  ! @ # $</span>
        <button class="pill on" id="g-syms" onclick="togglePill(this);gen()"></button>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="gen()">Regenerate</button>
      <button class="btn btn-solid" onclick="copyGen()">Copy</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let vault=[], editIdx=-1, key='', genPw='';

const xEnc=(t,k)=>btoa(t.split('').map((c,i)=>String.fromCharCode(c.charCodeAt(0)^k.charCodeAt(i%k.length))).join(''));
const xDec=(e,k)=>{try{return atob(e).split('').map((c,i)=>String.fromCharCode(c.charCodeAt(0)^k.charCodeAt(i%k.length))).join('');}catch{return'?';}};

function strength(pw){
  let s=0;
  if(pw.length>=8)s++;if(pw.length>=12)s++;
  if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;
  if(/[^A-Za-z0-9]/.test(pw))s++;
  return s;
}
const strColor=s=>s<=1?'#b53a3a':s<=3?'#b8963a':'#2a7c6f';
const strClass=s=>s<=1?'weak':s<=3?'medium':'strong';
function setBar(id,pw){const e=document.getElementById(id);e.style.width=(strength(pw)/5*100)+'%';e.style.background=strColor(strength(pw));}

document.getElementById('master-inp').addEventListener('input',function(){setBar('master-bar',this.value);});
document.getElementById('master-inp').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});

function unlock(){
  const pw=document.getElementById('master-inp').value;
  if(!pw){toast('Enter a password');return;}
  key=pw;
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('vault-screen').style.display='block';
  document.getElementById('hdr-dot').classList.add('on');
  document.getElementById('hdr-txt').textContent='Unlocked';
  if(vault.length===0)seed();
  render();
  toast('Vault unlocked');
}

function seed(){
  [{site:'github.com',user:'dev@example.com',pw:'G!tHub_Sec#99'},
   {site:'netflix.com',user:'user@gmail.com',pw:'netflix123'},
   {site:'amazon.com',user:'shop@email.com',pw:'Amaz0n$2024!'}]
  .forEach(d=>vault.push({site:d.site,user:d.user,enc:xEnc(d.pw,key),shown:false}));
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const list=document.getElementById('entries-list');
  const f=vault.filter(e=>e.site.toLowerCase().includes(q)||e.user.toLowerCase().includes(q));

  let strong=0,weak=0;
  vault.forEach(e=>{const s=strength(xDec(e.enc,key));if(s>=4)strong++;else if(s<=1)weak++;});
  document.getElementById('s-total').textContent=vault.length;
  document.getElementById('s-strong').textContent=strong;
  document.getElementById('s-weak').textContent=weak;

  if(f.length===0){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🔒</div><div class="empty-msg">${vault.length===0?'No entries yet':'Nothing found'}</div></div>`;
    return;
  }

  list.innerHTML='';
  f.forEach(entry=>{
    const ri=vault.indexOf(entry);
    const pw=xDec(entry.enc,key);
    const sc=strClass(strength(pw));
    const letter=entry.site.charAt(0).toUpperCase();
    const disp=entry.shown?pw:'··············';
    const el=document.createElement('div');
    el.className='entry';
    el.innerHTML=`
      <div class="entry-avatar">${letter}</div>
      <div class="entry-body">
        <div class="entry-site">${entry.site}</div>
        <div class="entry-sub">
          <div class="entry-user">${entry.user}</div>
          <div class="pip ${sc}"></div>
        </div>
      </div>
      <div class="entry-right">
        <span class="pw-val${entry.shown?' shown':''}">${disp}</span>
        <button class="btn-inline" onclick="toggleShow(${ri})">${entry.shown?'Hide':'Show'}</button>
        <button class="btn-inline" onclick="copyPw(${ri})">Copy</button>
        <button class="btn-inline" onclick="editEntry(${ri})">Edit</button>
        <button class="btn-inline danger" onclick="del(${ri})">Del</button>
      </div>`;
    list.appendChild(el);
  });
}

function toggleShow(i){vault[i].shown=!vault[i].shown;render();}
function copyPw(i){navigator.clipboard.writeText(xDec(vault[i].enc,key)).then(()=>toast('Password copied'));}
function del(i){vault.splice(i,1);render();toast('Entry deleted');}

function openAdd(){
  editIdx=-1;
  document.getElementById('modal-title').textContent='Add Password';
  ['f-site','f-user','f-pass'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('field-bar').style.width='0';
  document.getElementById('modal-add').classList.add('open');
}

function editEntry(i){
  editIdx=i;const e=vault[i];
  document.getElementById('modal-title').textContent='Edit Password';
  document.getElementById('f-site').value=e.site;
  document.getElementById('f-user').value=e.user;
  const pw=xDec(e.enc,key);
  document.getElementById('f-pass').value=pw;
  setBar('field-bar',pw);
  document.getElementById('modal-add').classList.add('open');
}

function save(){
  const site=document.getElementById('f-site').value.trim();
  const user=document.getElementById('f-user').value.trim();
  const pw=document.getElementById('f-pass').value;
  if(!site||!user||!pw){toast('Fill in all fields');return;}
  const entry={site,user,enc:xEnc(pw,key),shown:false};
  if(editIdx>=0)vault[editIdx]=entry;else vault.unshift(entry);
  closeModal('modal-add');render();
  toast(editIdx>=0?'Entry updated':'Entry saved');
}

function checkStr(){setBar('field-bar',document.getElementById('f-pass').value);}

function openGen(){document.getElementById('modal-gen').classList.add('open');gen();}
function syncLen(){document.getElementById('g-len-n').textContent=document.getElementById('g-len').value;}
function togglePill(el){el.classList.toggle('on');}

function gen(){
  const len=+document.getElementById('g-len').value;
  const upper=document.getElementById('g-upper').classList.contains('on');
  const nums=document.getElementById('g-nums').classList.contains('on');
  const syms=document.getElementById('g-syms').classList.contains('on');
  let chars='abcdefghijklmnopqrstuvwxyz';
  if(upper)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(nums)chars+='0123456789';
  if(syms)chars+='!@#$%^&*()-_=+[]{}|;:,.<>?';
  const arr=new Uint32Array(len);
  crypto.getRandomValues(arr);
  genPw=Array.from(arr).map(n=>chars[n%chars.length]).join('');
  document.getElementById('gen-out').textContent=genPw;
}

function copyGen(){if(genPw)navigator.clipboard.writeText(genPw).then(()=>toast('Copied to clipboard'));}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function toggleVis(id){const el=document.getElementById(id);el.type=el.type==='password'?'text':'password';}

let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);
}

document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(m=>m.classList.remove('open'));
});
</script>
</body>
</html>
